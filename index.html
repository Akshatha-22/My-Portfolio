<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshatha's Portfolio</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind Customization from original style.css -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brandPurple: '#C83EFA',
              brandBlack: '#000000',
              brandDark: '#1a1a1a',
              brandGray: '#555555',
              brandWhite: '#FFFFFF',
            },
            fontFamily: {
              sans: ['"Helvetica"', '"Arial"', 'sans-serif'],
              mono: ['"Lucida Console"', '"Courier New"', 'monospace'],
            },
            boxShadow: {
              'glow': '0 0 10px rgba(255, 255, 255, 0.3)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        margin: 0;
        background-color: #000000;
        color: #FFFFFF;
      }
      /* Custom Animations */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
    </style>
</head>
<body class="bg-brandBlack text-brandWhite font-sans min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        // --- COMPONENTS ---
        const { useState } = React;

        const Button = ({ children, onClick, active }) => (
            <button 
                onClick={onClick}
                className={`font-mono border-none text-brandBlack py-2 px-5 mx-1 my-1 cursor-pointer rounded-xl transition-all duration-400
                  ${active 
                      ? 'bg-brandGray font-bold text-brandWhite shadow-[0_5px_#666] translate-y-1' 
                      : 'bg-brandWhite hover:bg-brandBlack hover:text-brandWhite hover:border-2 hover:border-brandWhite hover:shadow-glow'
                   }
                `}
            >
                {children}
            </button>
        );

        const Header = ({ setPage }) => (
            <header className="p-10 pb-4">
                <h3 className="text-left w-full text-4xl leading-normal text-brandWhite font-sans">
                  Welcome! I'm
                </h3>
                <h1 className="text-left w-full text-[60px] md:text-[80px] text-brandPurple leading-tight font-bold font-sans my-2">
                  Akshatha Dungi
                </h1>
                <h3 className="text-left w-full text-3xl leading-normal text-brandWhite font-sans">
                  and<br/>This is my Portfolio.
                </h3>
                <nav className="mt-8 flex flex-wrap gap-2">
                    <Button onClick={() => setPage('about')}>About</Button>
                    <Button onClick={() => setPage('skills')}>Skills</Button>
                    <Button onClick={() => setPage('projects')}>Projects</Button>
                    <Button onClick={() => setPage('certifications')}>Certifications</Button>
                    <Button onClick={() => setPage('articles')}>Articles</Button>
                    <Button onClick={() => setPage('contact')}>Contact</Button>
                </nav>
                <hr className="border-t border-brandGray mt-6 opacity-30" />
            </header>
        );

        const About = () => (
            <section className="px-10 py-6 max-w-4xl mx-auto flex flex-col md:flex-row gap-8 items-center md:items-start">
               <div className="md:w-1/3">
                 <img src="mei.jpeg" alt="Profile Picture" className="w-[300px] h-[300px] rounded-full object-cover shadow-glow animate-float border-4 border-brandPurple" />
               </div>
               <div className="md:w-2/3 space-y-4 text-lg text-brandWhite leading-relaxed">
                 <h2 className="text-3xl text-brandPurple font-bold">About me</h2>
                 <p>I'm the kind of developer who thrives on change.</p>
                 <p>One day I'm deep in <b>Java</b> code, optimizing a Spring Boot microservice for thousands of concurrent users. The next, I'm experimenting with <b>LLM pipelines</b>, figuring out how to make an AI model understand business context. And I love every bit of it.</p>
                 <p>Why? Because I've learned that the best solutions don't come from sticking to what you know—they come from being <b>adaptable</b>.</p>
                 <div className="bg-brandDark p-6 rounded-2xl border border-brandGray mt-6">
                   <h4 className="text-xl font-bold mb-4 text-brandWhite">What makes me adaptable:</h4>
                   <ul className="space-y-2 list-disc pl-5">
                      <li>☕ <b>Java and Python are my anchors</b> – I've built deep expertise here, so I can move confidently through the backend world.</li>
                      <li>🧩 <b>Problem-solving is my default</b> – Give me a puzzle, and I'll find a way through it—even if I've never seen one like it before.</li>
                      <li>🎯 <b>Decisions, not habits</b> – I don't do things "because that's how they've always been done." I evaluate, decide, and own the outcome.</li>
                      <li>🤖 <b>Curiosity without ego</b> – I don't need to be the expert. I just need to be willing to learn, fast.</li>
                   </ul>
                 </div>
                 <p className="mt-4 italic">💼 Open to roles where adaptability is valued as much as expertise.</p>
               </div>
            </section>
        );

        const PlaceholderPage = ({ title, description }) => (
            <section className="px-10 py-10 max-w-4xl mx-auto text-center">
                <h2 className="text-4xl text-brandPurple font-bold mb-4">{title}</h2>
                <div className="h-[200px] flex items-center justify-center rounded-2xl bg-brandDark border border-brandGray shadow-glow">
                   <p className="text-xl text-brandWhite opacity-70 animate-pulse">{description}</p>
                </div>
            </section>
        );

        const App = () => {
            const [currentPage, setCurrentPage] = useState('about');
            
            const renderPage = () => {
                switch(currentPage) {
                    case 'about': return <About />;
                    case 'skills': return <PlaceholderPage title="My Skills" description="Skills section coming soon..." />;
                    case 'projects': return <PlaceholderPage title="Projects" description="Amazing projects loading..." />;
                    case 'certifications': return <PlaceholderPage title="Certifications" description="Certifications gallery under construction." />;
                    case 'articles': return <PlaceholderPage title="Articles" description="Technical articles loading..." />;
                    case 'contact': return <PlaceholderPage title="Contact" description="Contact info coming soon. Feel free to get in touch!" />;
                    default: return <About />;
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <Header setPage={setCurrentPage} />
                    <main className="flex-grow">
                        {renderPage()}
                    </main>
                    <footer className="py-6 text-center text-brandGray text-sm">
                        &copy; 2026 Akshatha Dungi. Crafted with React & Tailwind.
                    </footer>
                </div>
            );
        };

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
