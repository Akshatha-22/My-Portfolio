  <title>Akshatha Dungi | Software Developer</title>

  <!-- Theme Storage Script -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;600;700&display=swap"

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Tailwind Config -->

          fontFamily: {

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    // --- ICONS ---

    const IconLinkedin = ({ size = 20, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" /><rect width="4" height="12" x="2" y="9" /><circle cx="4" cy="4" r="2" /></svg>
    );
    const IconMail = ({ size = 20, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /></svg>
    );
    const IconMapPin = ({ size = 20, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></svg>
    );
    const IconExternalLink = ({ size = 20, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3h6v6" /><path d="M10 14 21 3" /><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /></svg>
    );
    const IconAward = ({ size = 20, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z" /><path d="m9 12 2 2 4-4" /></svg>
    );
    const IconBriefcase = ({ size = 20, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></svg>
    );
    const IconMenu = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></svg>
    );
    const IconClose = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
    );
    const IconSun = ({ size = 16, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4" /><path d="M12 2v2" /><path d="M12 20v2" /><path d="m4.93 4.93 1.41 1.41" /><path d="m17.66 17.66 1.41 1.41" /><path d="M2 12h2" /><path d="M20 12h2" /><path d="m6.34 17.66-1.41 1.41" /><path d="m19.07 4.93-1.41 1.41" /></svg>
    );
    const IconMoon = ({ size = 16, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" /></svg>
    );

    // --- HOOKS ---
    const useFadeIn = () => {
      const domRef = useRef();
      const [isVisible, setVisible] = useState(false);
      useEffect(() => {
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              setVisible(true);
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.15 });
        const { current } = domRef;
        if (current) observer.observe(current);
        return () => { if (current) observer.unobserve(current); };
      }, []);
      return { ref: domRef, isVisible };
    };

    const FadeInSection = ({ children, className = "" }) => {
      const { ref, isVisible } = useFadeIn();
      return (
        <div ref={ref} className={`fade-in-section ${isVisible ? 'is-visible' : ''} ${className}`}>
          {children}
        </div>
      );
    };

    // --- COMPONENTS ---
    const ThemeToggle = ({ isDark, toggleTheme }) => (
      <button
        onClick={toggleTheme}
        aria-label="Toggle Theme"
        style={{
          width: '52px', height: '28px',
          backgroundColor: isDark ? '#2a1a20' : '#EEC8E0',
          border: `1px solid ${isDark ? '#B4A0E5' : '#A8C7BB'}`,
          borderRadius: '9999px',
          position: 'relative',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
          padding: '0 6px'
        }}
        className="hover:scale-105 transition-all duration-300"
        title={`Switch to ${isDark ? 'Light' : 'Dark'} Mode`}
      >
        <div style={{
          position: 'absolute',
          left: isDark ? '2px' : '26px',
          top: '2px',
          width: '22px', height: '22px',
          borderRadius: '50%',
          backgroundColor: isDark ? '#CA3CFF' : '#392F5A',
          transition: 'left 300ms ease, background-color 300ms ease',
          zIndex: 1
        }}></div>
        <IconMoon size={12} className="relative z-0 text-[#392F5A]" style={{ opacity: isDark ? 0 : 1 }} />
        <IconSun size={12} className="relative z-0 text-[#B4A0E5]" style={{ opacity: isDark ? 1 : 0 }} />
      </button>
    );

    // --- SECTION NAVBAR ---
    const Navbar = ({ activeSection, isDark, toggleTheme }) => {
      const [isScrolled, setIsScrolled] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const navLinks = ['Hero', 'About', 'Experience', 'Projects', 'Skills', 'Certifications', 'Contact'];

      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const scrollToTarget = (id) => {
        const element = document.getElementById(id.toLowerCase());
        if (element) {
          element.scrollIntoView({ behavior: 'smooth' });
          setMobileMenuOpen(false);
        }
      };

      return (
        <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-[var(--nav-bg)] backdrop-blur-md py-4 shadow-lg' : 'bg-transparent py-6'}`}>
          <div className="max-w-7xl mx-auto px-6 lg:px-12 flex justify-between items-center">
            <div className="font-heading font-bold text-2xl text-[var(--color-primary)] tracking-tighter" onClick={() => scrollToTarget('hero')} style={{ cursor: 'pointer' }}>
              AD
            </div>

            {/* Desktop Nav */}
            <div className="hidden md:flex space-x-8 items-center">
              {navLinks.map((link) => {
                const isActive = activeSection === link.toLowerCase();
                return (
                  <button
                    key={link}
                    onClick={() => scrollToTarget(link)}
                    className={`text-sm font-medium transition-colors hover:text-[var(--color-primary)] ${isActive ? 'text-[var(--color-primary)] relative after:content-[""] after:absolute after:-bottom-1 after:left-0 after:w-full after:h-0.5 after:bg-[var(--color-highlight)] after:rounded' : 'text-[var(--color-text-muted)]'}`}
                  >
                    {link}
                  </button>
                );
              })}
              <div className="ml-4 border-l border-[var(--color-subtle)] pl-4">
                <ThemeToggle isDark={isDark} toggleTheme={toggleTheme} />
              </div>
            </div>

            {/* Mobile Controls */}
            <div className="flex items-center gap-4 md:hidden">
              <ThemeToggle isDark={isDark} toggleTheme={toggleTheme} />
              <button className="text-[var(--color-text-muted)] hover:text-[var(--color-primary)] transition-colors" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                {mobileMenuOpen ? <IconClose /> : <IconMenu />}
              </button>
            </div>
          </div>

          {/* Mobile Drawer */}
          <div className={`md:hidden absolute top-full left-0 w-full bg-[var(--drawer-bg)] backdrop-blur-md transition-all duration-300 overflow-hidden ${mobileMenuOpen ? 'max-h-screen py-4 border-b border-[var(--color-border)]' : 'max-h-0 py-0'}`}>
            <div className="flex flex-col space-y-4 px-6">
              {navLinks.map((link) => (
                <button
                  key={link}
                  onClick={() => scrollToTarget(link)}
                  className={`text-left text-lg font-medium transition-colors ${activeSection === link.toLowerCase() ? 'text-[var(--color-primary)]' : 'text-[var(--color-text-muted)] hover:text-[var(--color-text)]'}`}
                >
                  {link}
                </button>
              ))}
            </div>
          </div>
        </nav>
      );
    };

    // --- SECTION HERO ---
    const Hero = () => {
      const scrollToProjects = () => {
        document.getElementById('projects').scrollIntoView({ behavior: 'smooth' });
      };

      return (
        <section id="hero" className="relative min-h-screen flex items-center pt-20 overflow-hidden px-6 lg:px-12 max-w-7xl mx-auto">
          {/* Abstract Shapes */}
          <div className="absolute top-1/4 right-[10%] w-64 h-64 bg-[var(--color-primary)] opacity-10 rounded-full blur-3xl animate-float-shape-1 z-0"></div>
          <div className="absolute bottom-1/4 right-[20%] w-48 h-48 bg-[var(--color-text)] opacity-10 rounded-full blur-2xl animate-float-shape-2 z-0"></div>
          <div className="absolute top-1/3 left-[5%] w-72 h-72 bg-[var(--color-subtle)] opacity-10 rounded-full blur-3xl animate-float-shape-1 z-0" style={{ animationDelay: '2s' }}></div>

          <div className="relative z-10 max-w-3xl">
            <p className="hero-text-1 text-[var(--color-text-muted)] font-medium text-lg mb-4">Hello, I'm</p>
            <h1 className="hero-text-2 font-heading font-bold text-[var(--color-primary)] mb-4" style={{ fontSize: 'clamp(48px, 6vw, 80px)', lineHeight: '1.1' }}>
              Akshatha Dungi
            </h1>
            <h2 className="hero-text-3 font-body font-medium text-[var(--color-text)] text-xl md:text-2xl lg:text-3xl mb-6 tracking-wide">
              Software Developer &middot; Backend Specialist &middot; AI Curious
            </h2>
            <p className="hero-text-4 text-[var(--color-text-muted)] md:text-lg max-w-2xl leading-relaxed mb-10 opacity-90">
              I build scalable backends, experiment with LLMs, and thrive on adaptability.
              Merging solid software engineering principles with dynamic new technologies.
            </p>

            <div className="hero-buttons flex flex-wrap gap-4">
              <button onClick={scrollToProjects} className="bg-[var(--btn-primary-bg)] text-[var(--btn-primary-text)] font-semibold px-8 py-3 rounded-full hover:brightness-110 hover:scale-[1.02] transition-all duration-200 ease-out shadow-lg">
                View Projects
              </button>
              <a href="#" className="border-2 border-[var(--btn-ghost-border)] text-[var(--btn-ghost-text)] font-medium px-8 py-3 rounded-full hover:opacity-80 hover:scale-[1.02] transition-all duration-200 ease-out">
                Download Resume
              </a>
            </div>
          </div>
        </section>
      );
    };

    // --- SECTION ABOUT ---
    const About = () => {
      return (
        <section id="about" className="py-24 px-6 lg:px-12 max-w-7xl mx-auto relative">
          <FadeInSection>
            <div className="grid md:grid-cols-2 gap-12 items-center">
              <div className="flex justify-center md:justify-start order-2 md:order-1">
                <div className="relative">
                  <div className="absolute -inset-4 bg-[var(--color-primary)] opacity-20 rounded-full blur-xl"></div>
                  <img
                    src="mei.jpeg"
                    alt="Akshatha Dungi"
                    className="relative w-64 h-64 md:w-80 md:h-80 object-cover rounded-full border-[3px] border-[var(--color-primary)] animate-float shadow-2xl z-10"
                    onError={(e) => {
                      e.target.onerror = null;
                      e.target.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23CA3CFF' opacity='0.5'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
                      e.target.className = "relative w-64 h-64 md:w-80 md:h-80 object-cover rounded-full border-[3px] border-[var(--color-primary)] animate-float shadow-2xl z-10 bg-[var(--color-surface)]";
                    }}
                  />
                  <div className="absolute top-8 -right-4 bg-[var(--color-surface)] border border-[var(--color-subtle)] py-2 px-4 rounded-full text-[var(--color-text)] text-sm font-medium shadow-lg animate-float" style={{ animationDelay: '1s' }}>
                    Adaptable &lt;/&gt;
                  </div>
                </div>
              </div>
              <div className="order-1 md:order-2">
                <h2 className="font-heading font-bold text-3xl md:text-4xl text-[var(--color-primary)] mb-6">About Me</h2>
                <div className="space-y-4 text-[var(--color-text-muted)] leading-relaxed">
                  <p>
                    I'm the kind of developer who thrives on change. The tech landscape evolves rapidly, and I believe the best solutions come from being adaptable.
                  </p>
                  <p>
                    One day I'm deep in <span className="text-[var(--color-text)] font-semibold">Java code</span> building robust architectures... The next, establishing <span className="text-[var(--color-text)] font-semibold">LLM pipelines</span> to solve complex logical problems.
                  </p>

                  <div className="mt-8 bg-[var(--about-card-bg)] border border-[var(--color-border)] rounded-xl p-6 shadow-lg relative z-20">
                    <h3 className="text-[var(--color-text)] font-semibold mb-3">What makes me adaptable:</h3>
                    <ul className="space-y-3">
                      <li className="flex items-start"><span className="mr-3">☕</span> <span>Fast learner, fueled by curiosity (and coffee).</span></li>
                      <li className="flex items-start"><span className="mr-3">🧩</span> <span>I treat every new technology like a puzzle to solve.</span></li>
                      <li className="flex items-start"><span className="mr-3">🎯</span> <span>Focused on the end goal, flexible on the path to get there.</span></li>
                      <li className="flex items-start"><span className="mr-3">🤖</span> <span>Continuously integrating AI to optimize my workflow.</span></li>
                    </ul>
                  </div>
                  <p className="italic text-[var(--color-subtle)] mt-6">
                    💼 Open to roles where adaptability is valued as much as expertise.
                  </p>
                </div>
              </div>
            </div>
          </FadeInSection>
        </section>
      );
    };

    // --- SECTION EXPERIENCE ---
    const Experience = () => {
      const jobs = [
        {
          role: "Software Developer",
          company: "Tech Solutions Inc.",
          period: "2024 - Present",
          description: "Scaling backend infrastructure using Spring Boot, PostgreSQL, and AWS. Integrating LLM pipelines via LangChain to automate internal tools, saving 20 hours per week."
        },
        {
          role: "Junior Backend Engineer",
          company: "Innovate AI",
          period: "2023 - 2024",
          description: "Built and maintained REST APIs in Python (FastAPI). Containerized applications with Docker to streamline the deployment process."
        },
        {
          role: "Software Engineering Intern",
          company: "Startup Co.",
          period: "2022 - 2023",
          description: "Contributed to front-end development using React and Tailwind CSS. Developed internal admin dashboards."
        }
      ];

      return (
        <section id="experience" className="py-24 px-6 lg:px-12 max-w-7xl mx-auto">
          <FadeInSection>
            <div className="text-center mb-16">
              <h2 className="font-heading font-bold text-3xl md:text-4xl text-[var(--color-primary)] mb-2">Experience</h2>
              <p className="text-[var(--color-subtle)]">My professional journey</p>
            </div>

            <div className="max-w-4xl mx-auto relative cursor-default">
              {/* Vertical Line */}
              <div className="absolute left-[15px] md:left-1/2 top-0 bottom-0 w-px bg-[var(--color-border)] -translate-x-1/2 hidden md:block"></div>

              <div className="space-y-12 relative">
                {jobs.map((job, idx) => (
                  <div key={idx} className={`relative flex flex-col md:flex-row gap-8 items-start justify-between ${idx % 2 === 0 ? 'md:flex-row-reverse' : ''}`}>

                    {/* Timeline Dot */}
                    <div className="absolute left-0 md:left-1/2 w-8 h-8 rounded-full bg-[var(--color-surface)] border-[2px] border-[var(--color-primary)] text-[var(--color-primary)] flex items-center justify-center -translate-x-1/2 z-10 hidden md:flex">
                      <IconBriefcase size={14} />
                    </div>

                    {/* Content Card */}
                    <div className="w-full md:w-[45%] bg-[var(--color-surface)] border border-[var(--color-border)] rounded-2xl p-6 hover:border-[var(--color-subtle)] transition-colors shadow-lg relative group">
                      <div className="md:hidden inline-flex items-center gap-2 mb-3 text-[var(--color-primary)] bg-[var(--tech-tag-bg)] px-3 py-1.5 rounded-full text-xs font-bold">
                        <IconBriefcase size={14} />
                        <span>{job.period}</span>
                      </div>
                      <h3 className="font-heading font-bold text-xl text-[var(--color-text)]">{job.role}</h3>
                      <div className="flex justify-between items-center mb-4 mt-1">
                        <p className="text-[var(--color-text-muted)] font-medium">{job.company}</p>
                        <span className="text-sm font-semibold bg-[var(--tech-tag-bg)] text-[var(--tech-tag-text)] px-3 py-1 rounded-full hidden md:inline-block">
                          {job.period}
                        </span>
                      </div>
                      <p className="text-[var(--color-text-muted)] leading-relaxed text-sm lg:text-base opacity-90">
                        {job.description}
                      </p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </FadeInSection>
        </section>
      );
    };

    // --- SECTION PROJECTS ---
    const Projects = () => {
      const [filter, setFilter] = useState('All');
      const filters = ['All', 'Backend', 'AI/ML', 'Web'];

      const projects = [
        {
          title: "MicroCommerce",
          desc: "A scalable Spring Boot microservice backend for a modern e-commerce platform.",
          tags: ["Java", "Spring Boot", "PostgreSQL", "Kafka"],
          category: "Backend",
          github: "#",
          live: "#"
        },
        {
          title: "LLM Pipeline Toolkit",
          desc: "A Python-based utility suite for chaining dynamic LLM prompts and managing context windows.",
          tags: ["Python", "LangChain", "OpenAI API"],
          category: "AI/ML",
          github: "#",
          live: "#"
        },
        {
          title: "DevPortal API",
          desc: "A comprehensive REST API with role-based auth, rate limiting, and automated Swagger docs.",
          tags: ["FastAPI", "Python", "Redis", "Docker"],
          category: "Backend",
          github: "#",
          live: "#"
        }
      ];

      const filteredProjects = filter === 'All' ? projects : projects.filter(p => p.category === filter);

      return (
        <section id="projects" className="py-24 px-6 lg:px-12 max-w-7xl mx-auto">
          <FadeInSection>
            <div className="text-center mb-12">
              <h2 className="font-heading font-bold text-3xl md:text-4xl text-[var(--color-primary)] mb-2">Projects</h2>
              <p className="text-[var(--color-subtle)]">Things I've built</p>
            </div>

            <div className="flex flex-wrap justify-center gap-3 mb-12">
              {filters.map(f => (
                <button
                  key={f}
                  onClick={() => setFilter(f)}
                  className={`px-5 py-2 rounded-full text-sm font-medium transition-all ${filter === f ? 'bg-[var(--color-primary)] text-[var(--color-bg)] shadow-md' : 'bg-[var(--color-surface)] border border-[var(--color-border)] text-[var(--color-text-muted)] hover:border-[var(--color-primary)]'}`}
                >
                  {f}
                </button>
              ))}
            </div>

            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
              {filteredProjects.map((project, idx) => (
                <div key={idx} className="group bg-[var(--color-surface)] border border-[var(--color-border)] rounded-2xl p-6 transition-all duration-300 hover:-translate-y-2 hover:border-[var(--color-primary)] hover:shadow-lg flex flex-col h-full">
                  <h3 className="font-heading font-bold text-xl text-[var(--color-text)] mb-3">{project.title}</h3>
                  <p className="text-[var(--color-text-muted)] mb-6 flex-grow">{project.desc}</p>

                  <div className="flex flex-wrap gap-2 mb-6">
                    {project.tags.map(tag => (
                      <span key={tag} className="text-xs font-medium bg-[var(--tech-tag-bg)] text-[var(--tech-tag-text)] px-3 py-1 rounded-full">
                        {tag}
                      </span>
                    ))}
                  </div>

                  <div className="flex items-center gap-4 mt-auto pt-4 border-t border-[var(--color-border)]">
                    <a href={project.github} className="text-[var(--color-text-muted)] hover:text-[var(--color-primary)] transition-colors" aria-label="Github Repo">
                      <IconGithub size={20} />
                    </a>
                    <a href={project.live} className="text-[var(--color-text-muted)] hover:text-[var(--color-text)] transition-colors" aria-label="Live Demo">
                      <IconExternalLink size={20} />
                    </a>
                  </div>
                </div>
              ))}
            </div>
          </FadeInSection>
        </section>
      );
    };

    // --- SECTION SKILLS ---
    const Skills = () => {
      const skillCategories = [
        {
          title: "Languages",
          skills: ["Java", "Python", "JavaScript", "SQL", "HTML/CSS"]
        },
        {
          title: "Frameworks & Tools",
          skills: ["Spring Boot", "FastAPI", "React", "Docker", "Git", "Maven"]
        },
        {
          title: "AI & ML",
          skills: ["LangChain", "OpenAI API", "Prompt Engineering", "HuggingFace"]
        },
        {
          title: "Cloud & DevOps",
          skills: ["AWS (Basics)", "CI/CD Actions", "Linux", "REST APIs", "Postman"]
        }
      ];

      return (
        <section id="skills" className="py-24 px-6 lg:px-12 max-w-7xl mx-auto relative">
          <div className="absolute top-1/2 left-0 w-full h-px bg-gradient-to-r from-transparent via-[var(--color-subtle)]/10 to-transparent -z-10 opacity-50"></div>
          <FadeInSection>
            <div className="text-center mb-16">
              <h2 className="font-heading font-bold text-3xl md:text-4xl text-[var(--color-primary)] mb-2">Skills</h2>
              <p className="text-[var(--color-subtle)]">What I bring to the table</p>
            </div>

            <div className="grid md:grid-cols-2 gap-6 lg:gap-8">
              {skillCategories.map((category, idx) => (
                <div key={idx} className="bg-[var(--about-card-bg)] backdrop-blur-sm border border-[var(--color-border)] rounded-2xl p-6 transition-all hover:border-[var(--color-subtle)]">
                  <h3 className="font-heading font-bold text-xl text-[var(--color-text)] mb-5">{category.title}</h3>
                  <div className="flex flex-wrap gap-3">
                    {category.skills.map(skill => (
                      <div key={skill} className="flex items-center gap-2 bg-[var(--skill-pill-bg)] border border-[var(--skill-pill-border)] text-[var(--color-text)] px-4 py-2 rounded-full text-sm shadow-sm transition-transform hover:scale-105">
                        <span className="w-1.5 h-1.5 rounded-full bg-[var(--color-primary)]"></span>
                        {skill}
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </FadeInSection>
        </section>
      );
    };

    // --- SECTION CERTIFICATIONS ---
    const Certifications = () => {
      const certs = [
        { title: "Oracle Certified Professional: Java SE 11", issuer: "Oracle", year: "2023" },
        { title: "AWS Cloud Practitioner", issuer: "Amazon Web Services", year: "2024" },
        { title: "Deep Learning Specialization", issuer: "Coursera / DeepLearning.AI", year: "2024" }
      ];

      return (
        <section id="certifications" className="py-24 px-6 lg:px-12 max-w-7xl mx-auto overflow-hidden">
          <FadeInSection>
            <div className="text-center mb-12">
              <h2 className="font-heading font-bold text-3xl md:text-4xl text-[var(--color-primary)] mb-2">Certifications</h2>
              <p className="text-[var(--color-subtle)]">Validating knowledge with verifiable credentials</p>
            </div>

            <div className="flex md:grid md:grid-cols-3 gap-6 overflow-x-auto pb-8 hide-scrollbar snap-x touch-pan-x">
              {certs.map((cert, idx) => (
                <div key={idx} className="min-w-[280px] md:min-w-0 snap-center bg-[var(--color-surface)] border border-[var(--color-border)] border-l-[3px] border-l-[var(--color-primary)] rounded-xl p-6 shadow-lg relative group">
                  <div className="absolute top-5 right-5 text-[var(--color-text-muted)] opacity-20 group-hover:text-[var(--color-primary)] transition-colors group-hover:opacity-50">
                    <IconAward size={48} />
                  </div>
                  <h3 className="font-heading font-bold text-[var(--color-text)] text-lg md:text-xl pr-8 mb-2 z-10 relative">{cert.title}</h3>
                  <p className="text-[var(--color-text-muted)] mb-3 z-10 relative">{cert.issuer}</p>
                  <span className="inline-block text-xs font-semibold bg-[var(--tech-tag-bg)] text-[var(--tech-tag-text)] px-2 py-1 rounded z-10 relative">{cert.year}</span>
                </div>
              ))}
            </div>
          </FadeInSection>
        </section>
      );
    };

    // --- SECTION CONTACT ---
    const Contact = () => {
      const [formData, setFormData] = useState({ name: '', email: '', message: '' });
      const [errors, setErrors] = useState({});
      const [submitState, setSubmitState] = useState('idle'); // 'idle'|'loading'|'success'|'error'
      const [inboxOpen, setInboxOpen] = useState(false);
      const [messages, setMessages] = useState([]);
      const [loadingMsgs, setLoadingMsgs] = useState(false);

      useEffect(() => {
        const handler = (e) => {
          if (e.ctrlKey && e.shiftKey && e.key === 'M') {
            setInboxOpen(prev => {
              const opening = !prev;
              if (opening) loadMessages();
              return opening;
            });
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      const loadMessages = async () => {
        setLoadingMsgs(true);
        try {
          const result = await window.storage.list('messages:');
          const msgs = [];
          for (const key of result) {
            try {
              const val = await window.storage.get(key);
              if (val) msgs.push(JSON.parse(val));
            } catch (e) { console.error("Parse err", e); }
          }
          msgs.sort((a, b) => b.id - a.id);
          setMessages(msgs);
        } catch (e) {
          console.error("Failed to load messages:", e);
        } finally {
          setLoadingMsgs(false);
        }
      };

      const handleDelete = async (id) => {
        try {
          await window.storage.delete('messages:' + id);
          setMessages(prev => prev.filter(m => m.id !== id));
        } catch (e) {
          console.error("Failed to delete message:", e);
        }
      };

      const validate = () => {
        const newErrors = {};
        if (!formData.name.trim()) newErrors.name = 'Name is required';
        if (!formData.email.trim()) {
          newErrors.email = 'Email is required';
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) {
          newErrors.email = 'Invalid email address';
        }
        if (!formData.message.trim()) newErrors.message = 'Message is required';
        setErrors(newErrors);
        return Object.keys(newErrors).length === 0;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!validate()) return;

        setSubmitState('loading');
        const msg = {
          id: Date.now(),
          name: formData.name.trim(),
          email: formData.email.trim(),
          message: formData.message.trim(),
          sentAt: new Date().toISOString()
        };

        try {
          await window.storage.set('messages:' + msg.id, JSON.stringify(msg));
          setSubmitState('success');
          setFormData({ name: '', email: '', message: '' });
        } catch (err) {
          console.error("Storage error:", err);
          setSubmitState('error');
        }
      };

      const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
        if (errors[name]) setErrors(prev => ({ ...prev, [name]: '' }));
      };

      const inputClasses = "w-full bg-[var(--input-bg)] border border-[var(--input-border)] rounded-[10px] px-[14px] py-[10px] text-[var(--color-text)] placeholder-[var(--color-text-muted)] opacity-80 focus:opacity-100 focus:outline-none focus:ring-[2px] focus:ring-[var(--color-primary)] focus:border-transparent transition-all";

      return (
        <section id="contact" className="py-24 px-6 lg:px-12 max-w-7xl mx-auto relative">
          <div className="absolute bottom-0 left-[20%] w-96 h-96 bg-[var(--color-primary)] opacity-10 rounded-full blur-[100px] -z-10 pointer-events-none"></div>

          {/* Admin Inbox Overlay */}
          {inboxOpen && (
            <div className="fixed inset-0 z-[9999] bg-[var(--color-bg)] overflow-y-auto w-full h-full text-[var(--color-text)]">
              <div className="max-w-4xl mx-auto px-6 py-8">
                <div className="flex justify-between items-center mb-8 pb-4 border-b border-[var(--color-border)]">
                  <h2 className="font-heading font-bold text-2xl text-[var(--color-primary)]">📬 Message Inbox</h2>
                  <button onClick={() => setInboxOpen(false)} className="border border-[var(--color-subtle)] text-[var(--color-text)] px-4 py-2 rounded-lg hover:bg-[var(--color-subtle)]/10 transition-colors">✕ Close</button>
                </div>

                {loadingMsgs ? (
                  <div className="flex justify-center py-20">
                    <div className="w-10 h-10 border-4 border-[var(--color-primary)] opacity-30 border-t-[var(--color-primary)] rounded-full animate-spin"></div>
                  </div>
                ) : messages.length === 0 ? (
                  <div className="text-center py-20 text-[var(--color-subtle)]">No messages yet.</div>
                ) : (
                  <div className="space-y-4">
                    {messages.map(msg => (
                      <div key={msg.id} className="bg-[var(--color-surface)] border border-[var(--color-border)] rounded-[12px] px-5 py-4 relative group">
                        <div className="flex justify-between items-start mb-1">
                          <h4 className="font-bold text-[var(--color-text)]">{msg.name}</h4>
                          <span className="text-xs text-[var(--color-text-muted)] opacity-70">{new Date(msg.sentAt).toLocaleString()}</span>
                        </div>
                        <p className="text-[13px] text-[var(--color-text-muted)] mb-3">{msg.email}</p>
                        <div className="h-px bg-[var(--color-border)] mb-3 w-full"></div>
                        <p className="text-[var(--color-text-muted)] leading-[1.6] whitespace-pre-wrap">{msg.message}</p>

                        <button
                          onClick={() => handleDelete(msg.id)}
                          className="mt-4 text-sm text-[#FF6B6B] hover:bg-[#FF6B6B]/10 px-3 py-1.5 rounded-md transition-colors border border-transparent float-right"
                        >
                          Delete
                        </button>
                        <div className="clear-both"></div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}

          <FadeInSection>
            <div className="text-center mb-16">
              <h2 className="font-heading font-bold text-3xl md:text-4xl text-[var(--color-primary)] mb-3">Let's Connect</h2>
              <p className="text-[var(--color-text-muted)] max-w-xl mx-auto">
                I'm open to opportunities, collaborations, or just a good tech conversation.
              </p>
            </div>

            <div className="grid lg:grid-cols-2 gap-12">
              {/* Left: Contact Info */}
              <div className="space-y-4">
                <a href="mailto:akshatha@example.com" className="flex items-center p-5 bg-[var(--color-surface)] border border-[var(--color-border)] rounded-2xl hover:border-[var(--color-subtle)] transition-colors group">
                  <div className="bg-[var(--tech-tag-bg)] p-3 rounded-full text-[var(--color-primary)] transition-colors">
                    <IconMail size={24} />
                  </div>
                  <div className="ml-4">
                    <p className="text-sm text-[var(--color-subtle)] font-medium">Email</p>
                    <p className="text-[var(--color-text-muted)] group-hover:text-[var(--color-text)] transition-colors">akshatha@example.com</p>
                  </div>
                </a>

                <a href="#" target="_blank" rel="noopener noreferrer" className="flex items-center p-5 bg-[var(--color-surface)] border border-[var(--color-border)] rounded-2xl hover:border-[var(--color-subtle)] transition-colors group">
                  <div className="bg-[var(--tech-tag-bg)] p-3 rounded-full text-[var(--color-primary)] transition-colors">
                    <IconLinkedin size={24} />
                  </div>
                  <div className="ml-4">
                    <p className="text-sm text-[var(--color-subtle)] font-medium">LinkedIn</p>
                    <p className="text-[var(--color-text-muted)] group-hover:text-[var(--color-text)] transition-colors">linkedin.com/in/akshatha</p>
                  </div>
                </a>

                <a href="#" target="_blank" rel="noopener noreferrer" className="flex items-center p-5 bg-[var(--color-surface)] border border-[var(--color-border)] rounded-2xl hover:border-[var(--color-subtle)] transition-colors group">
                  <div className="bg-[var(--tech-tag-bg)] p-3 rounded-full text-[var(--color-primary)] transition-colors">
                    <IconGithub size={24} />
                  </div>
                  <div className="ml-4">
                    <p className="text-sm text-[var(--color-subtle)] font-medium">GitHub</p>
                    <p className="text-[var(--color-text-muted)] group-hover:text-[var(--color-text)] transition-colors">github.com/akshatha</p>
                  </div>
                </a>

                <div className="flex items-center p-5 bg-[var(--color-surface)] border border-[var(--color-border)] rounded-2xl group transition-colors">
                  <div className="bg-[var(--tech-tag-bg)] p-3 rounded-full text-[var(--color-primary)]">
                    <IconMapPin size={24} />
                  </div>
                  <div className="ml-4">
                    <p className="text-sm text-[var(--color-subtle)] font-medium">Location</p>
                    <p className="text-[var(--color-text-muted)]">India</p>
                  </div>
                </div>
              </div>

              {/* Right: Form Area */}
              <div>
                {submitState === 'success' ? (
                  <div className="bg-[#CAFFD0]/10 border border-[#CAFFD0]/40 rounded-2xl p-8 text-center">
                    <div className="w-16 h-16 bg-[#CAFFD0]/20 text-[#CAFFD0] flex items-center justify-center rounded-full mx-auto mb-4">
                      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5" /></svg>
                    </div>
                    <h3 className="font-heading font-bold text-2xl text-[#CAFFD0] mb-2">Message sent! I'll get back to you soon.</h3>
                    <p className="italic text-[var(--color-subtle)] mb-6">— Akshatha</p>
                    <button onClick={() => setSubmitState('idle')} className="text-sm border border-[#CAFFD0]/50 font-medium text-[#CAFFD0] hover:bg-[#CAFFD0]/10 px-4 py-2 rounded-lg transition-colors">
                      Send another
                    </button>
                  </div>
                ) : (
                  <div className="bg-[var(--contact-form-bg)] border border-[var(--color-border)] p-8 rounded-[16px]">
                    <h3 className="font-heading font-bold text-2xl text-[var(--color-primary)] mb-6">Send a Message</h3>

                    {submitState === 'error' && (
                      <div className="bg-[#FF6B6B]/10 border border-[#FF6B6B]/40 rounded-[10px] p-4 text-center mb-6">
                        <p className="text-[#FF6B6B] font-medium text-sm">Oops, something went wrong. Please try again.</p>
                      </div>
                    )}

                    <form onSubmit={handleSubmit} className="space-y-4" noValidate>
                      <div>
                        <input
                          type="text"
                          name="name"
                          value={formData.name}
                          onChange={handleChange}
                          className={inputClasses}
                          placeholder="Your Name"
                        />
                        {errors.name && <p className="text-[#FF6B6B] text-[13px] mt-1 ml-1">{errors.name}</p>}
                      </div>
                      <div>
                        <input
                          type="email"
                          name="email"
                          value={formData.email}
                          onChange={handleChange}
                          className={inputClasses}
                          placeholder="your@email.com"
                        />
                        {errors.email && <p className="text-[#FF6B6B] text-[13px] mt-1 ml-1">{errors.email}</p>}
                      </div>
                      <div>
                        <textarea
                          name="message"
                          value={formData.message}
                          onChange={handleChange}
                          className={`${inputClasses} resize-y min-h-[120px]`}
                          placeholder="What's on your mind?"
                        ></textarea>
                        {errors.message && <p className="text-[#FF6B6B] text-[13px] mt-1 ml-1">{errors.message}</p>}
                      </div>

                      <button
                        type="submit"
                        disabled={submitState === 'loading'}
                        className="w-full mt-2 bg-[var(--btn-primary-bg)] text-[var(--btn-primary-text)] font-bold rounded-[10px] py-[10px] px-[24px] hover:scale-[1.02] transition-all duration-200 disabled:opacity-70 disabled:hover:scale-100 flex items-center justify-center min-h-[44px] shadow-sm"
                      >
                        {submitState === 'loading' ? (
                          <span className="w-5 h-5 border-[2px] border-[var(--btn-primary-text)] opacity-30 border-t-white rounded-full animate-spin"></span>
                        ) : (
                          "Send Message"
                        )}
                      </button>
                    </form>
                  </div>
                )}
              </div>
            </div>
          </FadeInSection>
        </section>
      );
    };

    // --- SECTION FOOTER ---
    const Footer = () => (
      <footer className="border-t border-[var(--color-border)] py-8 text-center mt-12 mb-4">
        <p className="text-[var(--color-subtle)] text-sm">
          &copy; 2026 Akshatha Dungi — Built with React & Tailwind
        </p>
      </footer>
    );

    // --- APP ROOT ---
    const App = () => {
      const [activeSection, setActiveSection] = useState('hero');
      const [isDark, setIsDark] = useState(() => {
        return localStorage.getItem('theme') !== 'light';
      });

      // Sync theme to document element and storage
      useEffect(() => {
        if (isDark) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem('theme', 'light');
        }
      }, [isDark]);

      const toggleTheme = () => setIsDark(!isDark);

      useEffect(() => {
        const handleScrollSpy = () => {
          const sections = ['hero', 'about', 'experience', 'projects', 'skills', 'certifications', 'contact'];
          const scrollPos = window.scrollY + 100;
          for (const section of sections) {
            const el = document.getElementById(section);
            if (el && el.offsetTop <= scrollPos && el.offsetTop + el.offsetHeight > scrollPos) {
              setActiveSection(section);
            }
          }
        };
        window.addEventListener('scroll', handleScrollSpy);
        return () => window.removeEventListener('scroll', handleScrollSpy);
      }, []);

      return (
        <div className="font-body text-[var(--color-text-muted)] min-h-screen relative selection:bg-[var(--color-primary)] selection:opacity-30 selection:text-[var(--color-text)]">
          <Navbar activeSection={activeSection} isDark={isDark} toggleTheme={toggleTheme} />
          <main>
            <Hero />
            <About />
            <Experience />
            <Projects />
            <Skills />
            <Certifications />
            <Contact />
          </main>
          <Footer />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
